[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --strict-markers
    --tb=short
    -ra
markers =
    unit: Unit tests (no external dependencies)
    integration: Integration tests (may need DB or services)
    slow: Slow tests (bootstrap, grid search, etc.)
    ml: Machine learning pipeline tests
